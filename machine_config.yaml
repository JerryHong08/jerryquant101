# Machine Configuration for Multi-Machine Data Sharing
# =====================================================
# Set the role for this machine:
#   - "server": Fetches data from external APIs (Polygon, FMP) and serves to clients
#   - "client": Syncs metadata from server, runs local stock data processing
#
# Can be overridden by environment variable: MACHINE_ROLE=server|client

machine:
  role: "client"  # default role for this machine

# Server connection settings (used when role=client)
server:
  ssh_alias: "oldman"  # SSH alias or hostname (must have key-based auth)
  data_dir: "/home/oldman/quant_data/polygon_data"  # remote data directory

# Client settings (used when role=client)
client:
  data_dir: "/mnt/blackdisk/quant_data/polygon_data"  # local data directory

# Directories to sync from server to client (relative to data_dir)
# These are metadata/reference data that server fetches from APIs
sync_paths:
  - "raw/us_stocks_sip/splits"           # splits data from splits_fetch.py
  - "raw/us_stocks_sip/us_all_tickers"   # stocks/otc overview from all_tickers_fetch.py
  - "raw/us_indices/us_all_indices"      # indices overview from all_tickers_fetch.py
  - "raw/us_stocks_sip/float_shares"     # float shares from fmp_fundamental_fetch.py

# Rsync options
rsync:
  options: "-avz --progress --delete"  # archive, verbose, compress, show progress, delete removed files
  dry_run: false  # set to true to preview changes without syncing

# # On oldman (server) - fetch from external APIs
# MACHINE_ROLE=server ./scripts/weekly_update.sh

# # On WSL2 (client) - download stock data + sync metadata
# MACHINE_ROLE=client ./scripts/weekly_update.sh
# # Or just: ./scripts/weekly_update.sh  (defaults to client from config)
