site_name: Quant101
site_description: A structured quantitative research laboratory for equity alpha
site_author: Jerry Hong
site_url: https://jerryhong08.github.io/jerryquant101/

repo_name: JerryHong08/jerryquant101
repo_url: https://github.com/JerryHong08/jerryquant101

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quickstart.md
      - Data Setup: getting-started/data-setup.md
  - Architecture:
      - Overview: architecture/overview.md
      - Module Reference: architecture/modules.md
  - Research Guide:
      - Factor Research Workflow: research/factor-workflow.md
      - Position Sizing: research/position-sizing.md
      - Validation & Statistical Tests: research/validation.md
  - Lessons Learned:
      - Quant Notes: lessons/quant-notes.md
  - Changelog: changelog.md
